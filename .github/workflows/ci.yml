name: Backend Quality Gate

on:
  pull_request:
    branches:
      - develop
      - master
  push:
    branches:
      - develop
      - master

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Typecheck and Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Ruff lint
        run: uv run ruff check .

      - name: Run Ruff format check
        run: uv run ruff format --check .

      - name: Run mypy
        run: uv run mypy .

      - name: Run tests
        run: uv run pytest

  docker-smoke-test:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate Docker Compose configuration
        run: docker compose config

      - name: Build and start API container
        run: docker compose up --build -d

      - name: Show container status and recent logs
        run: |
          docker compose ps
          docker compose logs --no-color --timestamps --tail=200

      - name: Wait for health endpoint
        run: |
          set -eu
          timeout=60

          until curl --silent --show-error --fail http://localhost:8000/health; do
            timeout=$((timeout - 1))

            if [ "$timeout" -le 0 ]; then
              echo "Timed out waiting for /health; dumping Docker Compose diagnostics."
              docker compose ps
              docker compose logs --no-color --timestamps --tail=500
              exit 1
            fi

            sleep 1
          done

      - name: Check readiness endpoint
        run: curl --fail --retry 10 --retry-all-errors --retry-delay 2 http://localhost:8000/ready

      - name: Check version endpoint
        run: curl --fail --retry 10 --retry-all-errors --retry-delay 2 http://localhost:8000/version

      - name: Dump Docker Compose logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color --timestamps --tail=500

      - name: Stop Docker Compose
        if: always()
        run: docker compose down --remove-orphans
