name: Backend Quality Gate

on:
  pull_request:
    branches:
      - develop
      - master
  push:
    branches:
      - develop
      - master

jobs:
  quality:
    name: Lint, Typecheck and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Run Ruff lint
        run: uv run ruff check .

      - name: Run Ruff format check
        run: uv run ruff format --check .

      - name: Run mypy
        run: uv run mypy .

      - name: Run tests
        run: uv run pytest

  docker-smoke-test:
    name: Docker Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate Docker Compose configuration
        run: docker compose config

      - name: Build and start API container
        run: docker compose up --build -d

      - name: Check health endpoint
        run: curl --fail --retry 10 --retry-connrefused --retry-delay 2 http://localhost:8000/health

      - name: Check readiness endpoint
        run: curl --fail --retry 10 --retry-connrefused --retry-delay 2 http://localhost:8000/ready

      - name: Check version endpoint
        run: curl --fail --retry 10 --retry-connrefused --retry-delay 2 http://localhost:8000/version

      - name: Stop Docker Compose
        if: always()
        run: docker compose down
